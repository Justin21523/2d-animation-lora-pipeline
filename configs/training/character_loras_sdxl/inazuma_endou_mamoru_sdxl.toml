# Inazuma Eleven SDXL LoRA Training Config
# Character: Endou Mamoru (円堂守)
# Generated: 2025-12-19
# Adapted from 3D config to 2D anime optimization

[general]
# Output configuration
output_name = "inazuma_endou_mamoru_lora_sdxl"
output_dir = "/mnt/c/ai_models/diffusion/lora/sdxl/inazuma-eleven/endou_mamoru_identity"
pretrained_model_name_or_path = "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
vae = "/mnt/c/ai_models/stable-diffusion/vae/sdxl_vae.safetensors"

# Model architecture
v2 = false
v_parameterization = false
sdxl = true

[dataset]
# Dataset paths
train_data_dir = "/mnt/data/datasets/general/inazuma-eleven/lora_data/training_data_sdxl/endou_mamoru_identity"

# Resolution and bucketing (SDXL optimized)
resolution = "1024,1024"
enable_bucket = true
bucket_reso_steps = 64
bucket_no_upscale = true
min_bucket_reso = 768
max_bucket_reso = 1280

# Dataset repeats (200 images × 10 = 2000 steps/epoch)
dataset_repeats = 10

[training]
# Learning rates (2D anime optimized - conservative for stability)
learning_rate = 5e-05
unet_lr = 5e-05
text_encoder_lr = 2.5e-05

# LR scheduler (cosine with restarts for anime features)
lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2
lr_warmup_steps = 100

# Gradient clipping (CRITICAL for SDXL stability)
max_grad_norm = 1.0

# Network architecture (identity-focused)
network_module = "networks.lora"
network_dim = 32
network_alpha = 16

# Optimizer (memory-efficient)
optimizer_type = "AdamW8bit"

# Batch configuration (memory-safe)
train_batch_size = 1
gradient_accumulation_steps = 2
# Effective batch size = 1 × 2 = 2

# Training duration
max_train_epochs = 12
# Total steps ≈ 200 images × 10 repeats × 12 epochs / 2 = ~12,000 steps

# Regularization (2D anime specific)
caption_dropout_rate = 0.1
caption_dropout_every_n_epochs = 1
keep_tokens = 2  # Keep "inazuma_eleven, inazuma_endou_mamoru"

# Data loading
persistent_data_loader_workers = true
max_data_loader_n_workers = 4

# VAE configuration
vae_batch_size = 2

# Memory optimization
mixed_precision = "fp16"
cache_latents = true
cache_latents_to_disk = false  # RAM cache for speed (64GB available)
gradient_checkpointing = true
# xformers disabled - not available in environment

# Checkpointing
save_every_n_epochs = 2
save_last_n_epochs_state = 3
save_model_as = "safetensors"
save_precision = "fp16"

# Logging
logging_dir = "/mnt/c/ai_models/diffusion/lora/sdxl/inazuma-eleven/endou_mamoru_identity/logs"
log_with = "tensorboard"
log_prefix = "inazuma_endou_mamoru"

# Quality settings
clip_skip = 2
# min_snr_gamma disabled - causes NaN loss in SDXL
# noise_offset disabled initially for stability

# Reproducibility
seed = 42

# Character-specific metadata (for reference)
# Trigger word: inazuma_endou_mamoru
# Position: goalkeeper
# Element: mountain
# Key features: orange_headband, spiky_brown_hair, big_round_brown_eyes
# Timeline support: original, go, ares, orion (via caption tags)
