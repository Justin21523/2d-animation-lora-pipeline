# Based on Luca caption example:
# "a character named Luca, young boy with green scaly skin and purple hair in sea
#  monster form, wearing yellow t-shirt, curious expression, three-quarter view,
#  3d animated character, pixar style, smooth shading, warm outdoor lighting,
#  Italian coastal setting, full body shot"

