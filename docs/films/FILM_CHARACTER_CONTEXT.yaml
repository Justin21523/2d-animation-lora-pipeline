# ===================================================================
# Caption Generation Guidelines for LLMProvider API
# ===================================================================

caption_guidelines:
  general_principles:
    - "Start with trigger word/phrase (character name or location)"
    - "Be specific and detailed about visual elements"
    - "Include 3D/Pixar style markers"
    - "Mention lighting and atmosphere"
    - "Keep 40-77 tokens (SD training optimal length)"
    - "Use comma-separated phrases, no unnecessary words"
    - "Focus on what's VISIBLE in the image, not story context"

  character_captions:
    structure:
      - "Trigger: 'a character named [NAME]'"
      - "Physical description: age, species, distinctive features"
      - "Clothing: specific items and colors"
      - "Expression: emotional state visible in face"
      - "Pose: body position and gesture"
      - "View angle: close-up, portrait, three-quarter, full body"
      - "Style markers: '3d animated character, pixar style, smooth shading'"
      - "Lighting: quality and direction"
      - "Background: brief context if relevant"

    example_quality:
      luca_human: "a character named Luca, young teenage boy, tan skin, brown messy hair, large brown eyes, wearing yellow short-sleeve t-shirt and brown shorts, curious wide-eyed expression, standing pose with hands behind back, three-quarter front view, 3d animated character, pixar style, smooth PBR shading, warm outdoor Mediterranean lighting, Italian coastal town background, full body shot"

      luca_sea_monster: "a character named Luca, young sea monster boy, bright teal-green scaly skin with purple hair, large expressive green eyes, small dorsal fin, slim build, happy swimming pose with arms extended, front view, 3d animated character, pixar style, smooth shading with subsurface scattering on scales, underwater lighting with blue-green tones, full body shot"

      mei_human: "a character named Mei Lee, teenage girl, light skin with rosy cheeks, black hair in bob with red scrunchie, round red glasses, wearing red polo shirt with maple leaf, excited expression with wide smile and sparkly anime-style eyes, energetic standing pose with hands raised, front three-quarter view, 3d animated character, pixar style with anime influences, bright colorful lighting, urban background, full body shot"

      mei_panda: "a character named Mei Lee as red panda, giant fluffy red-orange fur with white markings, round panda face with large expressive eyes, huge fluffy tail with rings, standing on hind legs, embarrassed expression covering face with paws, front view, 3d animated character, pixar style, detailed fur rendering, warm indoor lighting, full body shot"

  background_captions:
    structure:
      - "Trigger: '[LOCATION NAME]'"
      - "Type: establishing shot, wide view, environment"
      - "Architecture/landscape: specific visual elements"
      - "Colors: dominant color palette"
      - "Atmosphere: weather, time of day, mood"
      - "Style: '3d animated environment, pixar style'"
      - "Lighting: quality and color temperature"
      - "Details: distinctive features or landmarks"

    example_quality:
      portorosso: "Portorosso town square, Italian coastal village with stacked colorful pastel buildings in yellows, oranges, and pinks, narrow cobblestone streets winding upward, Mediterranean architecture with terracotta roofs and stone walls, vintage 1960s Italian seaside charm, bright afternoon sunlight, clear blue sky, distant ocean view, 3d animated environment, pixar style, warm saturated colors, vibrant summer atmosphere, wide establishing shot, cinematic composition"

      land_of_dead: "Land of the Dead, towering vertical city of glowing buildings stacked impossibly high, marigold petal bridges connecting structures, vibrant glowing colors in purple, gold, and pink, papel picado decorations floating in air, magical bioluminescent glow everywhere, nighttime scene, 3d animated environment, pixar style, extremely saturated colors, whimsical fantastical atmosphere, wide establishing shot, Mexican folk art inspired"

  pose_captions:
    focus: "Emphasize action, body positioning, and movement"
    include:
      - "Character name + action verb"
      - "Specific pose description (leg position, arm gestures)"
      - "Dynamic or static nature"
      - "View angle relevant to pose"
      - "Motion lines or blur if applicable"
      - "Contextual setting if relevant to action"

  expression_captions:
    focus: "Emphasize facial features and emotion"
    include:
      - "Character name + emotion"
      - "Specific facial features (eyes, mouth, eyebrows)"
      - "Intensity of expression"
      - "Close-up or portrait framing"
      - "Emotional context"

  technical_keywords:
    framing:
      - "extreme close-up, close-up, medium close-up"
      - "portrait, headshot, bust shot"
      - "medium shot, waist-up, three-quarter"
      - "full body, wide shot, establishing shot"

    angles:
      - "front view, front three-quarter view"
      - "side view, profile, three-quarter profile"
      - "back view, over shoulder"
      - "high angle, low angle, eye level"
      - "dutch angle, dynamic angle"

    lighting:
      - "natural outdoor lighting, sunlight, golden hour"
      - "indoor lighting, warm interior light"
      - "dramatic lighting, rim lighting, backlighting"
      - "soft diffused light, hard shadows"
      - "magical glow, bioluminescence, neon"

    quality:
      - "3d animated character/environment"
      - "pixar style, pixar animation"
      - "smooth PBR shading, subsurface scattering"
      - "high quality render, anti-aliased"
      - "detailed textures, clean composition"
      - "cinematic lighting, professional animation quality"
